name: Database Governance Checks

on:
  workflow_call:

jobs:
  migration-naming:
    name: Migration Naming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check new migration file naming
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)

          if [[ -z "$NEW_MIGRATIONS" ]]; then
            echo "No new migration files: OK"
            exit 0
          fi

          echo "=== New migration files ==="
          echo "$NEW_MIGRATIONS"

          FAILED=0
          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue
            fname=$(basename "$migration")
            if ! echo "$fname" | grep -qE '^[0-9]{14}_[a-z0-9_]+\.sql$' && \
               ! echo "$fname" | grep -qE '^[0-9]{1,13}_shared_remote\.sql$'; then
              echo "::error file=$migration::Migration filename does not match required pattern: YYYYMMDDHHMMSS_description.sql"
              echo "::error file=$migration::Legacy hosted versions are allowed only as *_shared_remote.sql history-alignment artifacts."
              echo "::error file=$migration::Got: $fname"
              FAILED=1
            fi
          done <<< "$NEW_MIGRATIONS"

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more new migration files have invalid names."
            exit 1
          fi

          echo "All new migration filenames valid: OK"

  duplicate-timestamps-local:
    name: Duplicate Timestamps (Local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for duplicate timestamps in new migrations
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)

          if [[ -z "$NEW_MIGRATIONS" ]]; then
            echo "No new migration files: OK"
            exit 0
          fi

          DUPS=$(echo "$NEW_MIGRATIONS" | while IFS= read -r f; do
            basename "$f" | grep -oE '^[0-9]{14}'
          done | sort | uniq -d)

          if [[ -n "$DUPS" ]]; then
            echo "::error::Duplicate migration timestamps found among new files: $DUPS"
            exit 1
          fi

          while IFS= read -r new_migration; do
            [[ -z "$new_migration" ]] && continue
            new_ts=$(basename "$new_migration" | grep -oE '^[0-9]{14}' || true)
            [[ -z "$new_ts" ]] && continue

            EXISTING=$(git ls-files 'supabase/migrations/'"$new_ts"'_*.sql' 2>/dev/null || true)
            COUNT=$(echo "$EXISTING" | wc -l | tr -d ' ')
            if [[ "$COUNT" -gt 1 ]]; then
              echo "::error file=$new_migration::Timestamp $new_ts already exists in repository."
              echo "::error::Existing files with this timestamp:"
              echo "$EXISTING" | while read -r ef; do
                echo "::error::  $ef"
              done
              exit 1
            fi
          done <<< "$NEW_MIGRATIONS"

          echo "No duplicate timestamps among new migrations: OK"

  migration-docs-impact:
    name: Migration Docs Impact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check docs updated with migrations
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD")

          MIGRATION_FILES=$(echo "$CHANGED" | grep 'supabase/migrations/' || true)
          DOCS_FILES=$(echo "$CHANGED" | grep -E '^docs/|^README\.md' || true)
          GOV_REF=$(echo "$CHANGED" | grep 'docs/16_DATABASE_GOVERNANCE' || true)

          if [[ -n "$MIGRATION_FILES" ]]; then
            if [[ ! -f "docs/16_DATABASE_GOVERNANCE.md" ]]; then
              echo "::error::Migration files changed but docs/16_DATABASE_GOVERNANCE.md is not installed."
              echo "::error::Install the governance kit before making database changes."
              exit 1
            fi

            if [[ -z "$DOCS_FILES" ]]; then
              echo "::error::Migration files changed but no documentation was updated."
              echo "::error::Please update docs/00_CURRENT_STATE.md or docs/05_DECISION_LOG.md."
              exit 1
            fi

            echo "Migration files and docs both present: OK"
          else
            echo "No migration files changed: OK"
          fi

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for likely database secrets in tracked files
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          FAILED=0
          REDACTED_MATCHES=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            [[ "$file" == *.md ]] && continue
            [[ "$file" == *.yaml ]] && continue
            [[ "$file" == *.yml ]] && continue
            [[ "$file" == *.json ]] && continue
            [[ "$file" == *.toml ]] && continue
            [[ "$file" == .gitignore ]] && continue
            [[ "$file" == .github/* ]] && continue

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            # Pattern 1: PostgreSQL URL with embedded password
            # postgresql://user:password@host:port/db OR postgres://user:password@host:port/db
            if echo "$CONTENT" | grep -qE 'postgres(ql)?://[^@]+:[^@]+@'; then
              REDACTED_MATCHES+=("$file: PostgreSQL connection URL with embedded credentials (password redacted)")
              FAILED=1
            fi

            # Pattern 2: service_role JWT key (long base64-encoded string)
            # Only match if it's clearly a JWT token pattern (starts with eyJ and is long)
            # Skip if it appears in docs, comments, or is a known placeholder
            if echo "$CONTENT" | grep -qE '(service_role|SERVICE_ROLE).*(eyJ[A-Za-z0-9_\-]{100,})'; then
              REDACTED_MATCHES+=("$file: service_role key pattern detected (value redacted)")
              FAILED=1
            fi

            # Pattern 3: Supabase access token (sbp_ or sbp_ followed by 32+ hex chars)
            # Only flag in non-documentation files (already filtered above)
            if echo "$CONTENT" | grep -qE 'sbp_[a-f0-9]{40,}'; then
              REDACTED_MATCHES+=("$file: Supabase access token pattern detected (value redacted)")
              FAILED=1
            fi

            # Pattern 4: Supabase anon key in non-config files
            # The anon key is public by design, but should only appear in .env or deployment config
            # Flag it if it appears in source code files
            if echo "$CONTENT" | grep -qE '(eyJ[A-Za-z0-9_\-]{50,})'; then
              # Check if the file is a known config type — if not, it's suspect
              if ! echo "$file" | grep -qE '\.env|config|\.example|\.sample|\.test'; then
                REDACTED_MATCHES+=("$file: JWT token pattern detected outside config file (value redacted)")
                FAILED=1
              fi
            fi

          done <<< "$CHANGED"

          # Report redacted matches
          for match in "${REDACTED_MATCHES[@]}"; do
            echo "::error file=${match%%:*}$match"
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::Likely database secrets detected in changed files. Remove or move to .env / secrets manager."
            echo "::error::PostgreSQL project refs (e.g., abcdefghijklmnopqrst) are NOT secrets and are NOT flagged."
            echo "::error::Only credential-bearing URLs, service-role keys, and access tokens trigger this check."
            exit 1
          fi

          echo "No likely database secrets detected: OK"

  migration-header:
    name: Migration Header Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check new migrations have required headers
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)

          if [[ -z "$NEW_MIGRATIONS" ]]; then
            echo "No new migration files: OK"
            exit 0
          fi

          REQUIRED_HEADERS=(
            "Domain:"
            "Owner:"
            "Affected:"
            "Change class:"
            "Hosted write required:"
          )

          FAILED=0
          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue

            if [[ ! -f "$migration" ]]; then
              echo "::warning file=$migration::New migration file not found on disk (may be deleted)."
              continue
            fi

            for header in "${REQUIRED_HEADERS[@]}"; do
              if ! head -20 "$migration" | grep -q "$header"; then
                echo "::error file=$migration::Missing required migration header: $header"
                FAILED=1
              fi
            done
          done <<< "$NEW_MIGRATIONS"

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more new migrations missing required headers."
            echo "::error::Required headers: Domain, Owner, Affected, Change class, Hosted write required, Consumers"
            exit 1
          fi

          echo "All new migrations have required headers: OK"

  cross-domain-owner:
    name: Cross-Domain Owner Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check migration ownership matches repository
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)

          if [[ -z "$NEW_MIGRATIONS" ]]; then
            echo "No new migration files: OK"
            exit 0
          fi

          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
            DECLARED_OWNER=$(grep -i "migration owner:" docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null | head -1 || true)
          else
            DECLARED_OWNER=""
          fi

          FAILED=0
          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue
            [[ ! -f "$migration" ]] && continue

            MIG_OWNER=$(head -20 "$migration" | grep -E '^-- Owner:' | sed 's/-- Owner:[[:space:]]*//' | xargs || true)

            if [[ -n "$MIG_OWNER" ]]; then
              MIG_OWNER_LOWER=$(echo "$MIG_OWNER" | tr '[:upper:]' '[:lower:]')
              if [[ "$MIG_OWNER_LOWER" != *"$REPO_NAME"* ]]; then
                HAS_EXCEPTION=false
                if grep -qE -- '-- Cross-domain exception:|cross.domain.exception' "$migration" 2>/dev/null; then
                  HAS_EXCEPTION=true
                fi

                HAS_ISSUE_REF=$(echo "$PR_BODY" | grep -cE '(Refs|Closes|Fixes|Resolves)[[:space:]]+#[0-9]+' || true)

                if [[ "$HAS_EXCEPTION" == false ]]; then
                  echo "::error file=$migration::Migration declares owner '$MIG_OWNER' but this repository is '$REPO_NAME'."
                  echo "::error file=$migration::Add '-- Cross-domain exception: <Issue ref>' header or correct the owner."
                  FAILED=1
                elif [[ "$HAS_ISSUE_REF" -eq 0 ]]; then
                  echo "::warning file=$migration::Cross-domain exception present but no Issue reference found in PR."
                else
                  echo "Cross-domain exception with Issue reference found in $migration: OK"
                fi
              fi
            fi
          done <<< "$NEW_MIGRATIONS"

          if [[ "$FAILED" -eq 1 ]]; then
            exit 1
          fi

          echo "Migration ownership check: OK"

  runtime-impact-declaration:
    name: Runtime Impact Declaration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check runtime database impact documentation
        if: always()
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          # Detect files that suggest new or changed database-writing code
          #
          # We look for:
          #   1. Changed files that contain database write patterns (INSERT/UPDATE/DELETE + supabase/PostgreSQL client)
          #   2. New/Changed Worker files that interact with database
          #   3. New/Changed scheduled/cron job definitions
          #   4. New/Changed script files that perform bulk operations
          #
          # This check is NOT fragile — it only flags when strong signals are present.
          # It is a contract-based check: if you write database-code, document the runtime impact.

          WRITE_INDICATORS=0
          DETECTED_SIGNALS=()

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue

            # Skip docs, config, and non-code files
            if echo "$file" | grep -qE '\.(md|yaml|yml|json|toml|txt|env|example|sample)$'; then
              continue
            fi

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            # Signal 1: Database write operations in code files
            if echo "$CONTENT" | grep -qE '\.(insert|upsert|update|delete)\(|\.from\([^)]+\)\.(insert|upsert|update|delete)'; then
              DETECTED_SIGNALS+=("$file: database write operation (insert/upsert/update/delete) detected")
              WRITE_INDICATORS=$((WRITE_INDICATORS + 1))
            fi

            # Signal 2: Bulk/batch database operations
            if echo "$CONTENT" | grep -qE 'batchSize|batch_size|BATCH_SIZE|bulkInsert|bulk.*insert|bulk.*update|bulk.*delete'; then
              DETECTED_SIGNALS+=("$file: bulk/batch database operation pattern detected")
              WRITE_INDICATORS=$((WRITE_INDICATORS + 1))
            fi

            # Signal 3: Scheduled/cron job with database access
            if echo "$file" | grep -qE 'cron|scheduled|trigger' && echo "$CONTENT" | grep -qE '(supabase|pg|postgres|database|db)'; then
              DETECTED_SIGNALS+=("$file: scheduled/cron job with database access detected")
              WRITE_INDICATORS=$((WRITE_INDICATORS + 1))
            fi

            # Signal 4: Worker files with database write patterns
            if echo "$file" | grep -qiE 'worker' && echo "$CONTENT" | grep -qE '(supabase|createClient|\.from\()'; then
              DETECTED_SIGNALS+=("$file: Worker file with database client access detected")
              WRITE_INDICATORS=$((WRITE_INDICATORS + 1))
            fi

            # Signal 5: Import/sync scripts
            if echo "$file" | grep -qiE 'import|sync|backfill' && echo "$CONTENT" | grep -qE '(supabase|pg|postgres|database|db)'; then
              DETECTED_SIGNALS+=("$file: import/sync/backfill script with database access detected")
              WRITE_INDICATORS=$((WRITE_INDICATORS + 1))
            fi

          done <<< "$CHANGED"

          if [[ "$WRITE_INDICATORS" -eq 0 ]]; then
            echo "No database-writing code patterns detected: OK"
            exit 0
          fi

          echo "=== Detected database-writing code patterns ==="
          for signal in "${DETECTED_SIGNALS[@]}"; do
            echo "  - $signal"
          done
          echo ""

          # Now check if the PR body contains the required runtime impact declaration
          HAS_WORKLOAD_CATEGORY=$(echo "$PR_BODY" | grep -qiE 'Workload category:' && echo "yes" || echo "no")
          HAS_WORKLOAD_REGISTRY=$(echo "$PR_BODY" | grep -qiE '(Workload registry|DATABASE_WORKLOADS)' && echo "yes" || echo "no")

          # Check if workload declaration exists in repo files
          WORKLOAD_YAML_EXISTS=false
          if [[ -f "docs/DATABASE_WORKLOADS.yaml" ]]; then
            WORKLOAD_YAML_EXISTS=true
          fi

          LOCAL_DECL_EXISTS=false
          if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
            if grep -qiE '(Workload|workload|cron|sync|import|backfill)' docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null; then
              LOCAL_DECL_EXISTS=true
            fi
          fi

          if [[ "$HAS_WORKLOAD_REGISTRY" == "yes" ]]; then
            echo "Runtime workload declaration found in PR body: OK"
          elif [[ "$WORKLOAD_YAML_EXISTS" == true ]]; then
            echo "docs/DATABASE_WORKLOADS.yaml exists: workload registry available"
            # Non-blocking warning if workload.yaml exists but PR doesn't reference it
            if [[ "$HAS_WORKLOAD_CATEGORY" == "no" ]]; then
              echo "::warning::Database-writing code detected but PR body does not include Runtime Database Impact section."
              echo "::warning::Please add Runtime Database Impact and Operational Budget fields to the PR template."
            fi
          elif [[ "$LOCAL_DECL_EXISTS" == true ]]; then
            echo "Workload declaration found in docs/16_DATABASE_GOVERNANCE.local.md: OK"
          else
            echo "::warning::Database-writing code patterns detected without workload declaration."
            echo "::warning::Detected signals:"
            for signal in "${DETECTED_SIGNALS[@]}"; do
              echo "::warning::  $signal"
            done
            echo "::warning::"
            echo "::warning::This check is non-blocking. Required for compliance:"
            echo "::warning::  1. Fill in the Runtime Database Impact section in the PR description."
            echo "::warning::  2. Register recurring workloads in docs/DATABASE_WORKLOADS.yaml."
            echo "::warning::  3. Or declare one-off workloads in docs/16_DATABASE_GOVERNANCE.local.md."
            echo "::warning::"
            echo "::warning::If this code does NOT perform database writes at runtime,"
            echo "::warning::check 'No runtime database impact' in the PR template and ignore this warning."
          fi

  # ── Non-blocking contract checks ─────────────────────────────

  n-plus-one-detection:
    name: N+1 Lookup Detection
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect N+1 lookup patterns in changed code
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          SIGNALS_FOUND=0

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            [[ "$file" == *.md ]] && continue
            [[ "$file" == *.yaml ]] && continue
            [[ "$file" == *.yml ]] && continue
            [[ "$file" == *.json ]] && continue

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            HAS_DB_CLIENT=false
            HAS_LOOP=false
            HAS_BULK=false

            if echo "$CONTENT" | grep -qE '(\.from\(|\.select\(|createClient|supabase|pg\.|postgres\b)'; then
              HAS_DB_CLIENT=true
            fi

            if echo "$CONTENT" | grep -qE '\b(for|while|forEach|\.map\s*\(|for\s*\(|for\s+const|for\s+let|for\s+var|\.each\()'; then
              HAS_LOOP=true
            fi

            if echo "$CONTENT" | grep -qiE '(bulk|batch|Promise\.all|\.in\(|IN\s*\()'; then
              HAS_BULK=true
            fi

            if [[ "$HAS_DB_CLIENT" == true && "$HAS_LOOP" == true && "$HAS_BULK" == false ]]; then
              echo "::warning file=$file::Possible N+1 lookup pattern: database/API call inside a loop without visible bulk retrieval strategy."
              echo "::warning file=$file::If this loop iterates over input items and issues DB/API calls per item, add a bulk-fetch strategy or declare the request-count budget in the workload declaration."
              SIGNALS_FOUND=$((SIGNALS_FOUND + 1))
            fi

          done <<< "$CHANGED"

          if [[ "$SIGNALS_FOUND" -eq 0 ]]; then
            echo "No N+1 lookup patterns detected: OK"
          else
            echo "::warning::$SIGNALS_FOUND possible N+1 lookup pattern(s) detected."
            echo "::warning::This check is non-blocking. Address or declare exemption in workload declaration."
          fi

  change-aware-write-detection:
    name: Change-Aware Write Detection
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect periodic scan+write patterns without change detection
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          SIGNALS_FOUND=0

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            [[ "$file" == *.md ]] && continue
            [[ "$file" == *.yaml ]] && continue
            [[ "$file" == *.yml ]] && continue
            [[ "$file" == *.json ]] && continue

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            HAS_READ=false
            HAS_WRITE=false
            IS_CRON=false

            if echo "$CONTENT" | grep -qE '(\.select\(|SELECT\s+)'; then
              HAS_READ=true
            fi

            if echo "$CONTENT" | grep -qE '(\.upsert\(|\.update\(|\.insert\(|INSERT\s+|UPDATE\s+|\.save\()'; then
              HAS_WRITE=true
            fi

            if echo "$file" | grep -qiE 'cron|scheduled|trigger|timer' && echo "$CONTENT" | grep -qE '(supabase|createClient|\.from\()'; then
              IS_CRON=true
            fi

            if [[ "$HAS_READ" == true && "$HAS_WRITE" == true ]]; then
              HAS_CAW_DECL=false
              if echo "$PR_BODY" | grep -qiE 'change.aware|freshness_strategy|unchanged.write'; then
                HAS_CAW_DECL=true
              fi

              # Check local workload file
              if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
                if grep -qiE 'change.aware|freshness_strategy|unchanged.write' docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null; then
                  HAS_CAW_DECL=true
                fi
              fi

              if [[ "$HAS_CAW_DECL" == false ]]; then
                echo "::warning file=$file::Code combines database read and write operations — change-aware write review recommended."
                echo "::warning file=$file::Ensure periodic scans do not rewrite unchanged rows for per-row freshness timestamps unless justified."
                SIGNALS_FOUND=$((SIGNALS_FOUND + 1))
              fi
            fi

          done <<< "$CHANGED"

          if [[ "$SIGNALS_FOUND" -eq 0 ]]; then
            echo "No change-aware write concerns detected: OK"
          else
            echo "::warning::$SIGNALS_FOUND change-aware write concern(s) found."
            echo "::warning::This check is non-blocking. Declare change-aware write strategy in workload declaration."
          fi

  access-path-enforcement:
    name: Access Path Enforcement
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check database access path against ownership registry
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)
          REPO_NAME="${{ github.repository }}"

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          SIGNALS_FOUND=0

          # Detect database client imports
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            [[ "$file" == *.md ]] && continue
            [[ "$file" == *.yaml ]] && continue
            [[ "$file" == *.yml ]] && continue
            [[ "$file" == *.json ]] && continue
            [[ "$file" == *.toml ]] && continue

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            HAS_DIRECT_DB=false
            if echo "$CONTENT" | grep -qE '(createClient|supabase\.from|pg\.connect|Pool\(|new pg\.|psycopg|postgresql://)'; then
              HAS_DIRECT_DB=true
            fi

            if [[ "$HAS_DIRECT_DB" == true ]]; then
              echo "::notice file=$file::Database client import detected."
              SIGNALS_FOUND=$((SIGNALS_FOUND + 1))
            fi

            # Check if this repo is a declared consumer of another domain
            # If so, direct database access is a governance violation
            HAS_MIGRATION_CREATE=false
            if echo "$CONTENT" | grep -qE 'CREATE\s+(TABLE|VIEW|FUNCTION|TRIGGER|POLICY|SCHEMA|EXTENSION)'; then
              HAS_MIGRATION_CREATE=true
            fi

            if [[ "$HAS_DIRECT_DB" == true || "$HAS_MIGRATION_CREATE" == true ]]; then
              echo "::notice file=$file::Verify access path matches declared workload. Consumers must follow the domain's declared approved access boundary."
            fi

          done <<< "$CHANGED"

          # Check if PR body declares access path
          HAS_ACCESS_PATH=$(echo "$PR_BODY" | grep -qiE 'access.path|internal_api|supavisor|postgrest|direct_postgres' && echo "yes" || echo "no")

          if [[ "$SIGNALS_FOUND" -gt 0 && "$HAS_ACCESS_PATH" == "no" ]]; then
            echo "::warning::Database client imports detected ($SIGNALS_FOUND files). No access path declaration found in PR body."
            echo "::warning::Declare the approved access path (internal_api, supavisor, postgrest, or direct_postgres) in the workload declaration."
            echo "::warning::Consumers must follow the domain's declared approved access boundary as specified in DATABASE_OWNERSHIP.yaml."
          elif [[ "$SIGNALS_FOUND" -gt 0 ]]; then
            echo "Access path declaration found in PR body: OK"
          else
            echo "No database client imports detected: OK"
          fi

          echo ""
          echo "This check is non-blocking. It flags database access patterns without declared access paths."
          echo "See: docs/DATABASE_GOVERNANCE.md §13.11 (Access Path Declaration)"

  run-health-independence-check:
    name: Run Health Independence Check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect workload health patterns that may conflate historical and current-run status
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No changed files: OK"
            exit 0
          fi

          SIGNALS_FOUND=0

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ ! -f "$file" ]] && continue
            [[ "$file" == *.md ]] && continue
            [[ "$file" == *.yaml ]] && continue
            [[ "$file" == *.yml ]] && continue
            [[ "$file" == *.json ]] && continue

            CONTENT=$(cat "$file" 2>/dev/null || true)
            [[ -z "$CONTENT" ]] && continue

            HAS_CRON=true
            if echo "$file" | grep -qiE 'cron|scheduled|trigger|timer'; then
              HAS_CRON=true
            else
              HAS_CRON=false
            fi
            if echo "$CONTENT" | grep -qE '(supabase|createClient|\.from\()' && ! echo "$file" | grep -qiE 'cron|scheduled|trigger|timer'; then
              HAS_CRON=false
            fi

            if [[ "$HAS_CRON" == true ]]; then
              echo "::notice file=$file::Scheduled/cron workload detected."
              echo "::notice file=$file::Ensure current-run health assessment is independent from historical alerts (see DATABASE_GOVERNANCE.md §13.14)."
              SIGNALS_FOUND=$((SIGNALS_FOUND + 1))
            fi

          done <<< "$CHANGED"

          if [[ "$SIGNALS_FOUND" -eq 0 ]]; then
            echo "No scheduled workload patterns detected: OK"
          else
            echo "::notice::$SIGNALS_FOUND scheduled workload(s) detected."
            echo "::notice::Verify current-run finalization reports separate this-run metrics from historical debt."
          fi

  # ── Non-blocking warnings ─────────────────────────────────────

  migration-warnings:
    name: Migration Warnings
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for quality warnings
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          CHANGED_MIGRATIONS=$(git diff --name-only "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)
          WARNINGS=0

          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue
            [[ ! -f "$migration" ]] && continue
            if [[ ! -s "$migration" ]]; then
              echo "::warning file=$migration::Empty migration file detected."
              WARNINGS=$((WARNINGS + 1))
            fi
          done <<< "$CHANGED_MIGRATIONS"

          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue
            fname=$(basename "$migration")
            if echo "$fname" | grep -q '_remote\.sql$'; then
              if [[ -s "$migration" ]]; then
                echo "::warning file=$migration::_remote.sql file contains content. Remote history files should be empty or contain only comments."
                WARNINGS=$((WARNINGS + 1))
              fi
            fi
          done <<< "$CHANGED_MIGRATIONS"

          if [[ -n "$CHANGED_MIGRATIONS" ]]; then
            if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
              if ! grep -qE '(supabase.cli|CLI version)' docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null; then
                echo "::warning::Supabase CLI version not recorded in docs/16_DATABASE_GOVERNANCE.local.md."
                WARNINGS=$((WARNINGS + 1))
              fi
            fi
          fi

          if [[ -n "$CHANGED_MIGRATIONS" ]]; then
            while IFS= read -r migration; do
              [[ -z "$migration" ]] && continue
              [[ ! -f "$migration" ]] && continue
              if head -20 "$migration" | grep -qE 'CREATE TABLE'; then
                if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
                  if ! grep -qE 'access.class|access_class' docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null; then
                    echo "::warning file=$migration::New table created but no access class declaration found in docs/16_DATABASE_GOVERNANCE.local.md."
                    WARNINGS=$((WARNINGS + 1))
                  fi
                fi
              fi
            done <<< "$CHANGED_MIGRATIONS"
          fi

          if [[ -n "$CHANGED_MIGRATIONS" ]]; then
            TYPE_FILES=$(echo "$(git diff --name-only "$BASE"..."$HEAD")" | grep -E 'types|database\.ts|supabase\.ts' || true)
            if [[ -z "$TYPE_FILES" ]]; then
              if [[ -f "docs/16_DATABASE_GOVERNANCE.local.md" ]]; then
                if grep -qE 'generated.types.*exempt' docs/16_DATABASE_GOVERNANCE.local.md 2>/dev/null; then
                  echo "Generated types exempt: OK"
                else
                  echo "::warning::Migration files changed but no generated type files were updated."
                  echo "::warning::If this repo generates types, update them. If exempt, declare exemption in docs/16_DATABASE_GOVERNANCE.local.md."
                  WARNINGS=$((WARNINGS + 1))
                fi
              fi
            fi
          fi

          if [[ "$WARNINGS" -gt 0 ]]; then
            echo "::warning::$WARNINGS migration warning(s) found. Review and address where applicable."
          else
            echo "No migration warnings: OK"
          fi

  org-duplicate-timestamps:
    name: Org-Wide Duplicate Timestamps
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for org-wide duplicate timestamps
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE"..."$HEAD" -- 'supabase/migrations/*.sql' || true)

          if [[ -z "$NEW_MIGRATIONS" ]]; then
            echo "No new migration files: OK"
            exit 0
          fi

          echo "::warning::Organization-wide duplicate timestamp scan requires cross-repo access."
          echo "::warning::New migration timestamps:"

          while IFS= read -r migration; do
            [[ -z "$migration" ]] && continue
            ts=$(basename "$migration" | grep -oE '^[0-9]{14}' || true)
            [[ -n "$ts" ]] && echo "::warning::  $ts - verify uniqueness across all Retailpulses repos"
          done <<< "$NEW_MIGRATIONS"

          echo ""
          echo "Cross-repo timestamp verification must be performed manually or via a scheduled audit."
          echo "See: docs/DATABASE_GOVERNANCE.md §12 (Audit Cadence)"
