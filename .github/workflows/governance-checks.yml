name: Governance Checks

on:
  workflow_call:

jobs:
  issue-link-check:
    name: Issue Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR references GitHub Issue
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          COMBINED="${PR_TITLE} ${PR_BODY}"
          if echo "$COMBINED" | grep -qiE '(Refs|Related to|Issue|Closes|Fixes|Resolves)[[:space:]]+([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)?#[0-9]+'; then
            echo "Issue reference found: OK"
          else
            echo "::error::This PR does not reference a GitHub Issue."
            echo "::error::Add one of the following to the PR title or body:"
            echo "::error::  Refs #123"
            echo "::error::  Related to #123"
            echo "::error::  Issue #123"
            echo "::error::  Related to owner/repo#123"
            echo "::error::  Closes #123"
            echo "::error::  Fixes #123"
            echo "::error::  Resolves #123"
            exit 1
          fi

  docs-impact-check:
    name: Docs Impact Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check system-impacting changes without docs
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"..."${{ github.event.pull_request.head.sha }}")
          echo "=== Changed files ==="
          echo "$CHANGED"

          # Targeted docs contracts: only specific change types require docs
          # - New/removed production workload → sync inventory
          # - Database schema change → current state, decision log, or schema docs
          # - New platform dependency → platform policy/current state
          # - Internal bug fix (unchanged contract) → no mandatory docs
          SYSTEM_FILES=$(echo "$CHANGED" | grep -E '^(supabase/migrations/|src/.*schema|src/.*types|apps/.*/pages/|apps/.*/routes/)' || true)
          DOCS_FILES=$(echo "$CHANGED" | grep -E '^docs/|^README\.md' || true)

          if [ -n "$SYSTEM_FILES" ] && [ -z "$DOCS_FILES" ]; then
            echo "::error::System-impacting files changed but no documentation was updated."
            echo "::error::Please update docs/00_CURRENT_STATE.md or docs/05_DECISION_LOG.md."
            echo "$SYSTEM_FILES" | while read -r line; do
              echo "::error::  $line"
            done
            exit 1
          fi

          if [ -n "$SYSTEM_FILES" ]; then
            echo "System-impacting files changed and docs are present: OK"
          else
            echo "No system-impacting files detected: OK"
          fi

  governance-warnings:
    name: Governance Warnings (Non-Blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for governance warnings
        continue-on-error: true
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"..."${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
          echo "=== Non-blocking governance warnings ==="
          WARNINGS=0

          if echo "$CHANGED" | grep -qi 'baserow'; then
            echo "::warning::Baserow reference detected. Baserow is legacy and should be gradually discontinued."
            WARNINGS=$((WARNINGS + 1))
          fi

          if echo "$CHANGED" | grep -qi 'supabase.*service_role_key\|service.role'; then
            if echo "$CHANGED" | grep -qiE '\.(tsx|jsx|vue|svelte|html)$'; then
              echo "::warning::SUPABASE_SERVICE_ROLE_KEY reference detected in frontend/app code. Service role keys must not be exposed to frontend."
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          if echo "$CHANGED" | grep -qiE 'autoComplete="on"|autocomplete="on"'; then
            if echo "$CHANGED" | grep -qiE '\.(tsx|jsx|html)$'; then
              echo "::warning::Possible frontend input without explicit autocomplete policy. Non-login forms should set autoComplete=\"off\"."
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          if echo "$CHANGED" | grep -qiE '\.(vue|svelte|angular|jsp|erb)$'; then
            echo "::warning::Possible frontend stack drift from React + Vite + TypeScript. New frontend work should converge toward React + Vite + TypeScript."
            WARNINGS=$((WARNINGS + 1))
          fi

          if echo "$CHANGED" | grep -qiE 'wrangler\.toml|worker.*\.ts'; then
            if ! echo "$CHANGED" | grep -qiE 'docs/13_|docs/00_CURRENT_STATE|docs/05_DECISION_LOG'; then
              echo "::warning::New Cloudflare-specific dependency without docs update. Platform dependency policy (docs/13) should be reviewed."
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          if echo "$CHANGED" | grep -qiE 'supabase/migrations/'; then
            if ! echo "$CHANGED" | grep -qiE 'docs/12_|docs/00_CURRENT_STATE|docs/05_DECISION_LOG'; then
              echo "::warning::New Supabase migration without governance docs update. Data access standards (docs/12) should be reviewed."
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          if echo "$CHANGED" | grep -qiE '(\.env|secret|credential|password|token|api_key)\.md$'; then
            echo "::warning::Possible secrets committed to tracked files. Secrets must not be committed."
            WARNINGS=$((WARNINGS + 1))
          fi

          # Sync workload governance: warn when production sync files change without inventory update
          if echo "$CHANGED" | grep -qiE '(cron|scheduler|sync|reconcile|import|export|systemd|.service|.timer|wrangler.*cron|scripts/amazon/|scripts/rakuten/|scripts/mercari/)'; then
            if ! echo "$CHANGED" | grep -qiE 'SYNC_JOB_INVENTORY.md'; then
              echo "::warning::Possible production sync behavior changed without a sync inventory update."
              echo "::warning::Confirm whether schedule, source/target, write scope, entrypoint, kill switch, or workload lifecycle changed."
              echo "::warning::Update docs/SYNC_JOB_INVENTORY.md if governed facts changed."
              WARNINGS=$((WARNINGS + 1))
            fi
          fi

          if [ "$WARNINGS" -eq 0 ]; then
            echo "No governance warnings detected."
          else
            echo "$WARNINGS governance warning(s) reported above."
          fi
