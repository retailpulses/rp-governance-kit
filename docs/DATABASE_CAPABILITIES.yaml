# Database Capabilities Registry
# ==============================
# Canonical capability declarations for Retailpulses shared Supabase.
#
# Version: 1
# Last updated: 2026-07-17
# Governance ref: v1.5.0
#
# Governed by: retailpulses/rp-governance-kit
#
# This file answers: what can each repository do with each domain?
# For ownership, see DATABASE_OWNERSHIP.yaml
# For access policy, see DATABASE_ACCESS_POLICY.yaml
# For workload declarations, see DATABASE_WORKLOADS.yaml
#
# Schema:
#   database: logical database name
#   capabilities:
#     <repo>:
#       <domain>:
#         read: true | false
#         write: true | false
#         schema_change: true | false
#         notes: <free-text constraints>

database: retailpulses_shared

capabilities:

  # ── RPagentOS ─────────────────────────────────────────────
  retailpulses/RPagentOS:
    # Owned domains — full capability
    product_catalog:
      read: true
      write: true
      schema_change: true
    agent_os:
      read: true
      write: true
      schema_change: true
    task_management:
      read: true
      write: true
      schema_change: true
    project_management:
      read: true
      write: true
      schema_change: true
    listing_intelligence:
      read: true
      write: true
      schema_change: true
    listing_quality:
      read: true
      write: true
      schema_change: true
    # Consumer domains — read-only
    ticketing:
      read: true
      write: false
      schema_change: false

  # ── ticket-handling ───────────────────────────────────────
  retailpulses/ticket-handling:
    # Owned domain
    ticketing:
      read: true
      write: true
      schema_change: true
    # Consumer domains — read-only
    product_catalog:
      read: true
      write: false
      schema_change: false
    agent_os:
      read: true
      write: false
      schema_change: false
    task_management:
      read: true
      write: false
      schema_change: false
    project_management:
      read: true
      write: false
      schema_change: false
    listing_quality:
      read: true
      write: false
      schema_change: false

  # ── CatalogSync ───────────────────────────────────────────
  retailpulses/CatalogSync:
    # Consumer domain — read-only. Write workloads require separate
    # declaration and approval in DATABASE_WORKLOADS.yaml.
    product_catalog:
      read: true
      write: false
      schema_change: false
    # Consumer capability domain (no schema objects owned)
    catalog_sync:
      read: true
      write: false
      schema_change: false

  # ── OrderMgmt ─────────────────────────────────────────────
  retailpulses/OrderMgmt:
    order_management:
      read: true
      write: true
      schema_change: true

  # ── Skills ────────────────────────────────────────────────
  retailpulses/skills:sync-giga-saved-products:
    product_catalog:
      read: true
      write: true
      schema_change: false

  retailpulses/skills:mercari-csv-listing:
    product_catalog:
      read: true
      write: false
      schema_change: false