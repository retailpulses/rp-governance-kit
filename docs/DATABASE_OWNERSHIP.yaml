# Database Ownership Registry
# ============================
# Canonical machine-readable domain ownership for Retailpulses shared Supabase.
#
# Version: 4
# Last updated: 2026-07-17
# Governance ref: v2.0.0
#
# Governed by: retailpulses/rp-governance-kit
#
# Schema:
#   database: logical database name (no project ref or URL)
#   domains:
#     <domain-name>:
#       domain_type: schema | consumer_capability
#       owner: <owner-repo>                     # for schema domains
#       access_class: worker_only | authenticated_user | public_read | internal_admin
#       generated_types: <path or "exempt">
#       cross_domain: true | false
#       shared: true | false
#       consumers:
#         - repo: <consumer-repo>
#           capabilities:
#             read: true | false
#             write: true | false
#             schema_change: true | false
#           permitted_access_classes: [postgrest, internal_api, supavisor, direct_postgres]
#       objects:
#         tables: [<name>, ...]
#         views: [<name>, ...]
#         functions: [<name>, ...]
#         storage_buckets: [<name>, ...]
#       notes: <free-text technical debt, warnings, or domain-specific constraints>

database: retailpulses_shared

domains:

  # ── Ticketing ─────────────────────────────────────────────
  ticketing:
    domain_type: schema
    owner: retailpulses/ticket-handling
    access_class: worker_only
    generated_types: exempt
    cross_domain: true
    shared: false
    consumers:
      - repo: retailpulses/RPagentOS
        capabilities:
          read: true
          write: false
          schema_change: false
        permitted_access_classes:
          - postgrest
          - internal_api
    objects:
      tables:
        - ticket_issue_types
        - tickets
        - ticket_products
        - ticket_messages
        - ticket_notes
        - ticket_attachments
        - ticket_events
        - ticket_resolution_actions
        - ticket_statuses
        - message_drafts
        - sent_messages
        - copywriting_logs
        - customer_submissions
        - submission_tokens
        - inbound_ticket_messages
        - ticket_share_tokens
        - ticket_share_attachments
      views: []
      functions:
        - generate_ticket_number
        - update_updated_at_column
        - claim_pending_inbound_messages
        - record_ticket_resolution
        - finalize_ticketform_submission
        - finalize_operator_message_send
        - create_ticket_share
        - revoke_ticket_share
        - resolve_ticket_share
        - authorize_ticket_share_attachment
      storage_buckets: []
    notes: >
      Mixed migration naming: 0001/0002 (grandfathered sequential) + timestamp-based.
      18 zero-byte _remote.sql placeholder files for RPagentOS-authored migrations
      on the shared database. These are history alignment artifacts, not ownership claims.

  # ── Product Catalog & Platform Listings ───────────────────
  product_catalog:
    domain_type: schema
    owner: retailpulses/RPagentOS
    access_class: worker_only
    generated_types: exempt
    cross_domain: false
    shared: false
    consumers:
      - repo: retailpulses/CatalogSync
        capabilities:
          read: true
          write: false
          schema_change: false
        permitted_access_classes:
          - postgrest
          - internal_api
      - repo: retailpulses/ticket-handling
        capabilities:
          read: true
          write: false
          schema_change: false
        permitted_access_classes:
          - postgrest
          - internal_api
      - repo: retailpulses/skills:sync-giga-saved-products
        capabilities:
          read: true
          write: true
          schema_change: false
        permitted_access_classes:
          - internal_api
      - repo: retailpulses/skills:mercari-csv-listing
        capabilities:
          read: true
          write: false
          schema_change: false
        permitted_access_classes:
          - internal_api
    objects:
      tables:
        - products
        - product_variants
        - platform_listings
        - product_families
        - product_spus
        - product_assets
        - product_commercials
        - bundle_products
        - bundle_components
        - platform_listing_skus
        - platform_listing_images
        - platform_listing_attributes
        - platform_listing_price_tiers
        - product_platform_links
        - promotion_candidates
        - merchandising_focus_items
        - source_import_runs
        - source_import_rows
        - platform_accounts
        - import_errors
        - catalog_sync_runs
        - catalog_sync_failures
        - catalog_change_outbox
        - catalog_sync_api_requests
      views:
        - listing_target_classification_v1
        - baserow_886994_compat_vw
        - catalog_sync_products_vw
        - product_mercari_qty_vw
        - product_presale_qty_vw
        - product_rakuten_pricing_vw
        - catalogsync_marketplace_projection_v1
      functions:
        - set_updated_at
        - parse_giga_arrival_date
        - compute_effective_arrival_date
        - compute_effective_cost_price
        - compute_inventory_status
        - compute_presale_qty
        - compute_mercari_qty
      storage_buckets: []
    notes: >
      Core product and platform listing data model.
      Schema and migration ownership remain with RPagentOS.
      Consumer access paths are declared per workload in DATABASE_WORKLOADS.yaml.
      CatalogSync's disabled product-mirror workload is documented in the workload registry.
      Consumer access-path approval does not transfer schema ownership.

