        - order_message_templates
        - pipeline_run_log
      views: []
      functions: []
      storage_buckets: []
    notes: >
      TIMESTAMP COLLISION WARNING: 20260710000000 is used for order_mgmt_core.sql
      (this repo) AND inbound_ticket_messages.sql (ticket-handling) — different SQL.
      This is a real naming collision. Both migrations already exist on the hosted
      database. Do not rename either without a reviewed reconciliation plan.
      RLS policies exist on all tables (operator-read pattern).

  # ── Catalog Synchronization (consumer capability domain) ──
  catalog_sync:
    domain_type: consumer_capability
    owner: retailpulses/CatalogSync
    access_class: worker_only
    generated_types: exempt
    cross_domain: false
    shared: false
    consumers: []
    objects:
      tables: []
      views: []
      functions: []
      storage_buckets: []
    notes: >
      Consumer capability domain — CatalogSync owns no database schema objects
      and has no supabase/ directory. It is listed here for workload tracking
      and capability declaration purposes only. It does not own migrations for
      any database domain. Schema ownership for the product_catalog domain
      remains with retailpulses/RPagentOS.
      CatalogSync may use approved server-side access paths (PostgREST,
      internal_api) declared per workload in DATABASE_WORKLOADS.yaml.
      INCIDENT #23: The disabled product-mirror workload requires explicit
      re-approval before re-enable. See DATABASE_WORKLOADS.yaml and
      DATABASE_INCIDENT_RESPONSE.md for details.
