    last_reviewed: "2026-07-17"
    notes: >
      Views: catalogsync_mercari_listing_map_v1, catalogsync_mercari_catalog_v1
      (shared across all four Mercari shops).  Rows include shop_code.

      Role: catalogsync_shop1_reader (NOLOGIN, NOBYPASSRLS).  Security-barrier view role gate
      enforces shop_code = 'shop1' at the database boundary — this credential
      cannot read shop2/3/4 rows.  Per-shop roles enable independent revocation
      without cross-shop blast radius.

      Mercari shop ID: WMyisFmhbGWyVAPEwsfirn.

      Deployed 2026-07-17 via CatalogSync VPS release b17bd83-20260717110407.
      Production cutover 22:00 JST 2026-07-17: 5-SKU canary passed (5/5),
      first full sync applied 326 mutations (262 stock, 64 product), 0 failures.
      Legacy Baserow runners disabled (single-writer transition complete).

