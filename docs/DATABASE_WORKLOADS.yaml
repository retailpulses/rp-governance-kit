      - product_variants
      - platform_listings
    expected_volume_rows_min: 5570
    expected_volume_rows_target: 5570
    expected_volume_rows_max: 5570
    expected_request_count_min: 10
    expected_request_count_max: 100
    expected_runtime_seconds_max: 600
    concurrency_max: 2
    statement_timeout_ms: 30000
    max_retries: 3
    retry_strategy: exponential_backoff_with_jitter
    batch_size_min: 100
    batch_size_max: 250
    access_path: internal_api
    source_repo: retailpulses/CatalogSync
    deployed_from: ""  # must be populated when re-enabled
