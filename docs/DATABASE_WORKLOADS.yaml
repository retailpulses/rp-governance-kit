        mode: full
    status: pending_approval
    kill_switch:
      method: config_flag
      identifier: INQUIRY_INGEST_WRITES_ENABLED
      fail_closed: true
      disabled_value: "false"
    safety_profile:
      category: syncs
      risk_level: high
      description: >
        Mail ingestion Worker creates and updates inquiries from Zoho emails.
        New production write path — requires full high-risk rollout gates.
      affected_tables:
        - inquiries
        - inquiry_product_links
        - inquiry_knowledge_links
      affected_domains:
        - inquiry_management
        - product_catalog
      read_dependencies:
        - product_catalog.product_variants
        - product_catalog.platform_accounts
      expected_volume_rows_min: 0
      expected_volume_rows_max: 100
      expected_request_count_min: 1
      expected_request_count_max: 50
      expected_runtime_seconds_max: 120
      concurrency_max: 2
      statement_timeout_ms: 15000
      max_retries: 3
      retry_strategy: exponential_backoff_with_jitter
      batch_size_min: 1
      batch_size_max: 100
      cursor_strategy: zoho_cursor_with_bounded_in_clause_reads
      source_repo: retailpulses/workers
      deployed_from: ""
      request_budget:
        max_requests_per_invocation: 50
        max_rows_per_invocation: 100
        max_requests_per_1000_input_rows: 500
        bulk_fetch_strategy: IN-clause-batch
        formula: "50 requests / (100 max input rows / 1000) = 500 requests per 1000 rows"
      change_aware_writes:
        enabled: true
        freshness_strategy: source_message_identity
        unchanged_write_ratio_target: 0.0
      error_recording:
        mechanism: cloudflare_worker_structured_logs
        retention_days: 30
        owner_repo: retailpulses/workers
      rollout_gates:
        dry_run_completed: false
        dry_run_evidence_ref: "pending retailpulses/workers#20 Stage C evidence"
        kill_switch_tested: false
        canary_completed: false
        canary_row_limit: 10
      monitoring:
        mechanism: cloudflare_worker_logs_and_cron_metrics
        required_metrics:
          - input_rows
          - inserted_rows
          - updated_rows
          - error_count
          - retry_budget_consumed
          - statement_timeout_count
        warning_thresholds:
          error_count: 1
          retry_budget_pct: 30
        critical_thresholds:
          error_rate_pct: 10
          retry_budget_pct: 50
      rollback: "Set INQUIRY_INGEST_WRITES_ENABLED=false"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    local_inventory_status: pending_in_owner_repo
    notes: >
      Replaces Baserow table 886975 writes. Kill switch is evaluated fail-closed at
      batch boundaries. retailpulses/workers PR #20 must add and populate the declared
      local inventory path before this workload may activate.

