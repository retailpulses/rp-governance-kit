  # ── CatalogSync Amazon/Rakuten marketplace projection API ──────────────
  catalogsync_marketplace_projection_api_read:
    owner_repo: retailpulses/CatalogSync
    category: scheduled_jobs
    risk_level: medium
    domain: product_catalog
    status: pending_approval
    description: >
      Read-only PostgREST workload used by the CatalogSync Cloudflare Worker
      to serve authenticated Amazon and Rakuten marketplace projections to VPS
      consumers. The Worker may read only the RPagentOS-owned
      catalogsync_marketplace_projection_v1 view.
    trigger: "manual canary; schedule enabled only after rollout gates"
    affected_tables:
      - catalogsync_marketplace_projection_v1
    expected_volume_rows_min: 1
    expected_volume_rows_target: 2500
    expected_volume_rows_max: 10000
    expected_request_count_min: 1
    expected_request_count_max: 50
    expected_runtime_seconds_max: 120
    concurrency_max: 4
    statement_timeout_ms: 10000
    max_retries: 2
    retry_strategy: exponential_backoff_with_jitter
    batch_size_min: 1
    batch_size_max: 200
    access_path: postgrest
    source_repo: retailpulses/CatalogSync
    deployed_from: ""
    runtime_host: "Cloudflare Worker giga-catalog-sync-production"
    credential_owner: "retailpulses/RPagentOS product_catalog domain owner"
    credential_contract:
      role: catalogsync_marketplace_reader
      service_role_forbidden: true
      generic_anon_forbidden: true
      operation_mode: read_only
      allowed_resources:
        catalogsync_marketplace_projection_v1:
          - projection_row_id
          - product_variant_id
          - item_code
          - product_status
          - source_available_qty
          - owned_qty
          - presale_qty
          - restock_date
          - inventory_status
          - sync_status
          - last_sync_success_at
          - inventory_updated_at
          - platform
          - shop_code
          - account_id
          - marketplace_id
          - shop_id
          - account_status
          - listing_id
          - external_listing_id
          - manage_number
          - listing_status
          - listing_updated_at
          - listing_sku_id
          - seller_sku
          - sku_code
          - marketplace_variant_id
          - sku_status
          - mapping_updated_at
          - match_method
    kill_switch:
      method: deploy_rollback
      documented_at: "retailpulses/CatalogSync#35"
      identifier: CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED
    request_budget:
      max_requests_per_invocation: 50
      max_requests_per_1000_input_rows: 20
      bulk_fetch_strategy: pagination-cursor
    change_aware_writes:
      enabled: false
      freshness_strategy: run_level
      unchanged_write_ratio_target: 0.0
    rollout_gates:
      dry_run_completed: false
      canary_completed: false
      canary_row_limit: 1
      healthy_cycles_required: 2
      healthy_cycles_completed: 0
      re_enable_approval: false
    expected_runtime_seconds: 120
    incident_ref: ""
    monitoring:
      warning_thresholds:
        connections_pct: 80
        cpu_pct: 70
        timeout_rate_pct: 5
        retry_budget_pct: 30
      critical_thresholds:
        connections_pct: 95
        cpu_pct: 90
        timeout_rate_pct: 15
        retry_budget_pct: 50
    approved_by: "Pending RPagentOS projection PR and CatalogSync#35 merge"
    approved_at: ""
    last_reviewed: "2026-07-17"
    notes: >
      Two-hop architecture: VPS consumers call the CatalogSync-owned
      authenticated internal API; the CatalogSync Worker separately reads the
      RPagentOS-owned projection through this declared PostgREST workload. No
      automatic fallback, database writes, base-table grants, schema privilege,
      or service-role credential. Production activation requires the owner
      migration, dedicated role JWT, unauthorized/authenticated endpoint smoke,
      SKU-scoped Amazon and Rakuten dry-runs, and deployed_from evidence.

  # ── CatalogSync Mercari shop4 read projection ─────────────────────────
  catalogsync_mercari_shop4_read:
    owner_repo: retailpulses/CatalogSync
    category: scheduled_jobs
    risk_level: medium
    domain: product_catalog
    status: pending_approval
    description: >
      Read-only Supabase projection used by the fixed-IP CatalogSync VPS to
      reconcile Mercari shop4 inventory, presale title prefix, and shipping
      lead time. It does not write Supabase and does not cover shops 1-3,
      Amazon, Rakuten, dashboards, or archival.
    trigger: "*/10 * * * * full; * * * * * bounded priority"
    affected_tables:
      - platform_accounts
      - platform_listings
      - platform_listing_skus
      - product_variants
      - product_commercials
    expected_volume_rows_min: 5000
    expected_volume_rows_target: 22000
    expected_volume_rows_max: 25000
    expected_request_count_min: 10
    expected_request_count_max: 100
    expected_runtime_seconds_max: 540
    concurrency_max: 1
    statement_timeout_ms: 20000
    max_retries: 3
    retry_strategy: exponential_backoff_with_jitter
    batch_size_min: 1
    batch_size_max: 500
    access_path: postgrest
    source_repo: retailpulses/CatalogSync
    deployed_from: ""
    runtime_host: "160.251.141.110"
    credential_owner: "retailpulses/RPagentOS product_catalog domain owner"
    credential_contract:
      role: catalogsync_shop4_reader
      service_role_forbidden: true
      database_writes_forbidden: true
      rotation_days_max: 90
      storage: /root/mercari-sync/.env
      file_mode: "0600"
    request_budget:
      max_requests_per_invocation: 100
      max_rows_per_invocation: 25000
      max_requests_per_1000_input_rows: 5
      bulk_fetch_strategy: pagination-cursor
    mapping_strategy:
      order:
        - explicit_variant_id
        - canonical_sku_code
        - canonical_seller_sku
      missing_or_ambiguous: fail_closed
      shop_scope: shop4
    change_aware_writes:
      enabled: true
      freshness_strategy: run_level
      unchanged_write_ratio_target: 0.0
      database_writes: false
      marketplace_writes_only_on_diff: true
    kill_switch:
      method: deploy_rollback
      documented_at: "retailpulses/CatalogSync#23"
      identifier: CATALOGSYNC_SHOP4_ENABLED
    rollout_gates:
      dry_run_completed: false
      canary_completed: false
      canary_row_limit: 5
      healthy_cycles_required: 3
      healthy_cycles_completed: 0
      mapping_dry_run_completed: false
      full_apply_completed: false
    approved_by: ""
    approved_at:
    last_reviewed: "2026-07-16"
    incident_ref: "retailpulses/CatalogSync#23"
    notes: >
      Owner approval is represented by the RPagentOS migration that provisions
      the column-limited read role and shop-isolation policies. The runtime
      token must never be a Supabase service-role credential. Production
      Mercari access remains restricted to VPS 160.251.141.110.
    monitoring:
      warning_thresholds:
        connections_pct: 80
        cpu_pct: 70
        timeout_rate_pct: 5
        retry_budget_pct: 30
      critical_thresholds:
        connections_pct: 95
        cpu_pct: 90
        timeout_rate_pct: 15
        retry_budget_pct: 50

  # ── Documentation for New Entries ────────────────────────────────────────
#
# Required fields for every real workload entry:
#   workload_id                          — unique identifier (kebab-case, no "example_" prefix for real entries)
#   owner_repo                           — GitHub owner/repo that owns this workload
#   category                             — one of: imports, syncs, backfills, scheduled_jobs, agent_operations, maintenance, diagnostics
#   risk_level                           — low, medium, high
#   status                               — active, disabled, or pending_approval
#   domain                               — must match a declared domain in DATABASE_OWNERSHIP.yaml
#   description                          — human-readable explanation of what this workload does
#   trigger                              — cron expression, "manual", "event_driven", or "on_deploy"
#   affected_tables                      — list of tables touched (reads or writes)
#   expected_volume_rows_min               — minimum estimated rows per invocation
#   expected_volume_rows_max               — maximum estimated rows per invocation
#   expected_request_count_min             — minimum estimated request count per invocation
#   expected_request_count_max             — maximum estimated request count per invocation
#   expected_runtime_seconds_max           — expected runtime ceiling in seconds
#   concurrency_max                        — max concurrent database connections
#   statement_timeout_ms                   — per-query timeout in ms
#   max_retries                            — max retries per unit of work
#   retry_strategy                         — exponential_backoff_with_jitter, fixed_delay, or none
#   batch_size_min                         — min rows per INSERT/UPDATE/DELETE statement
#   batch_size_max                         — max rows per INSERT/UPDATE/DELETE statement (must not exceed §13.3 limit)
#   access_path                            — internal_api, supavisor, postgrest, or direct_postgres
#   source_repo                            — GitHub repo containing the workload source code
#   deployed_from                          — commit SHA or release tag (may be empty if disabled)
#   kill_switch.method                     — one of: worker_cancel, dashboard_session_terminate, sql_terminate_backend, deploy_rollback
#   kill_switch.documented_at              — URL or reference where the procedure is documented
#   kill_switch.identifier                 — config key, cron name, or timer name that disables this workload
#   request_budget.max_requests_per_invocation  — absolute ceiling per run
#   request_budget.max_requests_per_1000_input_rows — requests per 1k input (must scale with input; formula must be documented)
#   request_budget.bulk_fetch_strategy     — IN-clause-batch, bulk-endpoint, pagination-cursor, or none (none requires justification)
#   change_aware_writes.enabled          — whether change detection is implemented
#   change_aware_writes.freshness_strategy — run_level or per_row (per_row requires justification)
#   change_aware_writes.unchanged_write_ratio_target — target max ratio (ratios above this trigger review)
#   rollout_gates.dry_run_completed      — whether zero-write dry-run passed
#   rollout_gates.canary_completed       — whether bounded live canary passed
#   rollout_gates.canary_row_limit       — row limit used for canary
#   rollout_gates.healthy_cycles_required — minimum healthy cycles before operational
#   rollout_gates.healthy_cycles_completed — healthy cycles completed so far
#   rollout_gates.re_enable_approval     — required if workload was disabled by incident
#   incident_ref                         — GitHub issue URL or #number if previously disabled
#   monitoring.warning_thresholds        — connections_pct, cpu_pct, timeout_rate_pct, retry_budget_pct
#   monitoring.critical_thresholds       — connections_pct, cpu_pct, timeout_rate_pct, retry_budget_pct
#   approved_by                          — who authorized (person, role, or Issue ref; may be explicit if disabled)
#   approved_at                          — ISO date (may be empty if disabled/pending)
#   last_reviewed                        — ISO date of last review
#   notes                                — any additional context, dependencies, known limitations
#
# Optional fields:
#   depends_on          — list of workload_ids this workload depends on
#   excluded_windows    — cron expressions or time windows when this workload must NOT run
#   rollback_procedure  — URL or description of how to undo this workload's effects
