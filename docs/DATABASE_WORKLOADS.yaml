      (1) explicit infra authority approval,
      (2) access path verified and declared,
      (3) batch size bounded to 100-250, request budget to tens/low hundreds,
      (4) change-aware writes with run-level freshness,
      (5) all rollout gates completed in sequence,
      (6) deployed from a reviewed Git commit (no untracked VPS source).

  # ── CatalogSync Marketplace Projection API ────────────────────────────
  catalogsync_marketplace_projection_api_read:
    owner_repo: retailpulses/CatalogSync
    domain: product_catalog
    mode: read_only
    access_path: postgrest
    credential_class: read_only
    triggers:
      - type: manual
    # schedule enabled only after rollout gates
    status: active
    kill_switch:
      method: deploy_rollback
      identifier: CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED
    safety_profile:
      category: scheduled_jobs
      risk_level: medium
      description: >
        Read-only PostgREST workload used by the CatalogSync Cloudflare Worker
        to serve authenticated Amazon and Rakuten marketplace projections to VPS
        consumers. The Worker may read only the RPagentOS-owned
        catalogsync_marketplace_projection_v1 view.
      affected_tables:
        - catalogsync_marketplace_projection_v1
      concurrency_max: 4
      statement_timeout_ms: 10000
      max_retries: 2
      retry_strategy: exponential_backoff_with_jitter

      request_budget:
        max_requests_per_invocation: 50
        max_requests_per_1000_input_rows: 20
        bulk_fetch_strategy: pagination-cursor

      incident_ref: ""
      rollback: "Deploy rollback to disable CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    credential_contract:
      role: catalogsync_marketplace_reader
      service_role_forbidden: true
      generic_anon_forbidden: true
      operation_mode: read_only
    approved_by: "Retailpulses owner; evidence retailpulses/RPagentOS#32 issuecomment-4999776725"
    approved_at: "2026-07-17"
    last_reviewed: "2026-07-17"
    notes: >
      Two-hop architecture: VPS consumers call the CatalogSync-owned
      authenticated internal API; the CatalogSync Worker separately reads the
      RPagentOS-owned projection through this declared PostgREST workload. No
      automatic fallback, database writes, base-table grants, schema privilege,
      or service-role credential. Production activation requires the owner
      migration, dedicated role JWT, endpoint smoke tests, SKU-scoped dry-runs,
      and deployed_from evidence.

  # ── CatalogSync Mercari shop4 read projection ─────────────────────────
  catalogsync_mercari_shop4_read:
    owner_repo: retailpulses/CatalogSync
    domain: product_catalog
    mode: read_only
    access_path: postgrest
    credential_class: read_only
    triggers:
      - type: cron
        expression: "*/10 * * * *"
        mode: full
      - type: cron
        expression: "* * * * *"
        delay_seconds: 30
        mode: priority
    status: active
    kill_switch:
      method: deploy_rollback
      identifier: CATALOGSYNC_SHOP4_ENABLED
    safety_profile:
      category: scheduled_jobs
      risk_level: medium
      description: >
        Read-only Supabase projection used by the CatalogSync VPS to reconcile
        Mercari shop4 inventory, presale title prefix, and shipping lead time.
        It does not write Supabase and does not cover shops 1-3, Amazon,
        Rakuten, dashboards, or archival.
      affected_tables:
        - platform_accounts
        - platform_listings
        - platform_listing_skus
        - product_variants
        - product_commercials
      concurrency_max: 1
      statement_timeout_ms: 20000
      max_retries: 3
      retry_strategy: exponential_backoff_with_jitter
      request_budget:
        max_requests_per_invocation: 100
        max_rows_per_invocation: 25000
        max_requests_per_1000_input_rows: 5
        bulk_fetch_strategy: pagination-cursor
      incident_ref: "retailpulses/CatalogSync#23"
      rollback: "Deploy rollback to disable CATALOGSYNC_SHOP4_ENABLED"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    credential_contract:
      role: catalogsync_shop4_reader
      service_role_forbidden: true
      database_writes_forbidden: true
      rotation_days_max: 90
      storage: /root/mercari-sync/.env
      file_mode: "0600"
    approved_by: "retailpulses/CatalogSync#29"
    approved_at: "2026-07-17"
    last_reviewed: "2026-07-17"
    notes: >
      Owner approval via RPagentOS PRs 33 and 34 (read-only shop4 projection
      and dedicated Auth identity).

      Active views: catalogsync_mercari_shop4_listing_map_v1 and
      catalogsync_mercari_shop4_catalog_v1. The dedicated
      catalogsync_shop4_reader credential is limited to the approved Shop4
      projections and cannot read Shops 1-3 or base tables. Migration to the
      planned shared projections is a separate, not-yet-activated change.

      The runtime token must never be a Supabase service-role credential.
      Completion report at CatalogSync PR #32.

