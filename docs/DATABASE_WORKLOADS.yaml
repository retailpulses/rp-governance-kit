# Database Workload Registry
# ===========================
# Canonical machine-readable registry of all recurring database workloads.
# One-off workloads are declared in their originating Issue or work brief.
#
# Version: 3
# Last updated: 2026-07-16
# Governance ref: v1.4.0
#
# Schema per workload entry:
#   workload_id: unique identifier (kebab-case)
#   category: imports | syncs | backfills | scheduled_jobs | agent_operations | maintenance | diagnostics
#   risk_level: low | medium | high
#   domain: domain from DATABASE_OWNERSHIP.yaml
#   description: human-readable description
#   owner_repo: GitHub owner/repo that owns this workload
#   status: active | disabled | pending_approval
#   trigger: cron_expression | manual | event_driven | on_deploy
#   affected_tables: [table_name, ...]
#   expected_volume_rows_min: minimum expected row count per invocation
#   expected_volume_rows_target: normal expected row count per invocation
#   expected_volume_rows_max: maximum expected row count per invocation
#   expected_request_count_min: minimum estimated request count per invocation
#   expected_request_count_max: maximum estimated request count per invocation
#   expected_runtime_seconds_max: expected runtime ceiling in seconds
#   concurrency_max: maximum concurrent connections
#   statement_timeout_ms: per-query timeout in milliseconds
#   max_retries: maximum retries per unit of work
#   retry_strategy: exponential_backoff_with_jitter | fixed_delay | none
#   batch_size_min: min rows per INSERT/UPDATE/DELETE statement
#   batch_size_max: max rows per INSERT/UPDATE/DELETE statement (must not exceed §13.3 limit)
#   access_path: internal_api | supavisor | postgrest | direct_postgres
#   source_repo: GitHub repo containing the workload source
#   deployed_from: commit SHA or release tag of the deployed code
#   kill_switch:
#     method: worker_cancel | dashboard_session_terminate | sql_terminate_backend | deploy_rollback
#     documented_at: where the kill-switch procedure is documented
#     identifier: config key, cron name, or timer name that disables this workload
#   request_budget:
#     max_requests_per_invocation: absolute ceiling per run
#     max_requests_per_1000_input_rows: requests per 1k input rows (must scale with input; formula must be documented)
#     bulk_fetch_strategy: IN-clause-batch | bulk-endpoint | pagination-cursor | none
#   change_aware_writes:
#     enabled: true | false
#     freshness_strategy: run_level | per_row (requires justification if per_row)
#     unchanged_write_ratio_target: decimal (target; ratios above this trigger review)
#   rollout_gates:
#     dry_run_completed: true | false
#     canary_completed: true | false
#     canary_row_limit: integer
#     healthy_cycles_required: integer
#     healthy_cycles_completed: integer
#     re_enable_approval: true | false (required if previously disabled by incident)
#   expected_runtime_seconds: integer
#   incident_ref: GitHub issue URL or #number if previously disabled
#   monitoring:
#     warning_thresholds: { connections_pct: 80, cpu_pct: 70, timeout_rate_pct: 5, retry_budget_pct: 30 }
#     critical_thresholds: { connections_pct: 95, cpu_pct: 90, timeout_rate_pct: 15, retry_budget_pct: 50 }
#   approved_by: who authorized this workload
#   approved_at: YYYY-MM-DD
#   last_reviewed: YYYY-MM-DD
#   notes: free-text notes, dependencies, known limitations

database: retailpulses_shared

workloads:

  # ── Ticketing Seller Share Event API ──────────────────────────────────
  ticket_share_event_api:
    owner_repo: retailpulses/ticket-handling
    category: agent_operations
    risk_level: medium
    domain: ticketing
    status: pending_approval
    description: >
      Event-driven operator create/rotate/revoke operations and seller page
      resolve/evidence authorization for seven-day ticket share links. The
      ConoHa viewer calls an authenticated ticketing Worker bridge and has no
      direct database credentials.
    trigger: event_driven
    affected_tables:
      - tickets
      - ticket_products
      - ticket_attachments
      - platform_accounts
      - ticket_share_tokens
      - ticket_share_attachments
    expected_volume_rows_min: 1
    expected_volume_rows_target: 2
    expected_volume_rows_max: 52
    expected_request_count_min: 1
    expected_request_count_max: 6
    expected_runtime_seconds_max: 10
    concurrency_max: 1
    statement_timeout_ms: 5000
    max_retries: 0
    retry_strategy: none
    batch_size_min: 1
    batch_size_max: 50
    access_path: postgrest
    source_repo: retailpulses/ticket-handling
    deployed_from: ""
    kill_switch:
      method: deploy_rollback
      documented_at: "retailpulses/ticket-handling#151"
      identifier: ENABLE_TICKET_SHARES
    request_budget:
      max_requests_per_invocation: 6
      max_requests_per_1000_input_rows: 6000
      bulk_fetch_strategy: none
    change_aware_writes:
      enabled: true
      freshness_strategy: run_level
      unchanged_write_ratio_target: 0.0
    rollout_gates:
      dry_run_completed: true
      canary_completed: false
      canary_row_limit: 1
      healthy_cycles_required: 2
      healthy_cycles_completed: 0
      re_enable_approval: false
    approved_by: "retailpulses/ticket-handling#151"
    approved_at: "2026-07-16"
    last_reviewed: "2026-07-16"
    incident_ref: ""
    notes: >
      Migration replay and functional lifecycle tests passed in isolated local
      PostgreSQL. `none` bulk-fetch strategy is intentional because each request
      is scoped to one ticket/share; product and attachment reads are batched,
      never N+1. Create/rotate retries are idempotent by client operation UUID,
      but the Worker performs no automatic retry. Production remains pending
      until the reviewed ticket-handling commit is recorded in deployed_from,
      schema backup/preflight gates pass, and the ConoHa canary completes.
    monitoring:
      warning_thresholds:
        connections_pct: 80
        cpu_pct: 70
        timeout_rate_pct: 5
        retry_budget_pct: 30
      critical_thresholds:
        connections_pct: 95
        cpu_pct: 90
        timeout_rate_pct: 15
        retry_budget_pct: 50

