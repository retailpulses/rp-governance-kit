        unchanged_write_ratio_target: 0.0
      rollout_gates:
        dry_run_completed: false
        canary_completed: false
        canary_row_limit: 1
        healthy_cycles_required: 2
        healthy_cycles_completed: 0
        re_enable_approval: false
      monitoring:
        warning_thresholds:
          connections_pct: 80
          cpu_pct: 70
          timeout_rate_pct: 5
          retry_budget_pct: 30
        critical_thresholds:
          connections_pct: 95
          cpu_pct: 90
          timeout_rate_pct: 15
          retry_budget_pct: 50
      incident_ref: ""
      rollback: "Deploy rollback to disable CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED"
    credential_contract:
      role: catalogsync_marketplace_reader
      service_role_forbidden: true
      generic_anon_forbidden: true
      operation_mode: read_only
    approved_by: "Pending RPagentOS projection PR and CatalogSync#35 merge"
    approved_at: ""
    last_reviewed: "2026-07-17"
    notes: >
      Two-hop architecture: VPS consumers call the CatalogSync-owned
      authenticated internal API; the CatalogSync Worker separately reads the
      RPagentOS-owned projection through this declared PostgREST workload. No
      automatic fallback, database writes, base-table grants, schema privilege,
      or service-role credential. Production activation requires the owner
      migration, dedicated role JWT, endpoint smoke tests, SKU-scoped dry-runs,
      and deployed_from evidence.

