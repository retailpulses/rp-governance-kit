# Database Workload Registry — Shared-Database Risk Governance
# ==========================================================
# Registry of recurring workloads that require shared-database ownership,
# access-path, credential, or database-risk governance.
#
# This is NOT a master inventory of all sync behavior. Schedules, release SHAs,
# batch sizes, marketplace mapping, and monitoring thresholds are owned by the
# business repository's local sync inventory (docs/SYNC_JOB_INVENTORY.md).
#
# Version: 6
# Last updated: 2026-07-19
# Governance ref: v1.6.0
#
# Governed by: retailpulses/rp-governance-kit
#
# ── Risk-Based Profiles ─────────────────────────────────────
#
# Every workload entry starts with a standard declaration.
# Only workloads that meet one or more high-risk conditions require
# the extended safety_profile section.
#
# Standard declaration (minimum for all workloads):
#
#   workload_id:               unique identifier (lower_snake_case)
#   owner_repo:                GitHub owner/repo
#   domain:                    domain from DATABASE_OWNERSHIP.yaml
#   mode:                      read_only | write
#   access_path:               postgrest | supavisor | internal_api | direct_postgres
#   credential_class:          read_only | write_scoped | admin | service_role
#   triggers:                  structured trigger objects (see below)
#   status:                    active | disabled | pending_approval
#   kill_switch:
#     method:                  worker_cancel | dashboard_session_terminate | sql_terminate_backend | deploy_rollback
#     identifier:              config key, cron name, or timer name that disables this workload
#
# Extended safety_profile (required when any condition applies):
#
#   Conditions requiring extended profile:
#     - mode: write                           (database writes)
#     - High expected row/request volume      (high volume)
#     - trigger is cron/scheduled             (frequent cron)
#     - credential_class is admin or service_role (privileged credential)
#     - Destructive or data-rewriting ops     (destructive transformation)
#     - Large blast radius                    (many consumers or domains affected)
#     - Prior related incident                (incident_ref is set)
#
#   safety_profile:
#     category:                imports | syncs | backfills | scheduled_jobs | agent_operations | maintenance | diagnostics
#     risk_level:              low | medium | high
#     description:             human-readable description
#     affected_tables:         [table_name, ...]
#     concurrency_max:         integer
#     statement_timeout_ms:    integer
#     max_retries:             integer
#     retry_strategy:          exponential_backoff_with_jitter | fixed_delay | none
#     request_budget:
#       max_requests_per_invocation: integer
#       max_requests_per_1000_input_rows: integer
#       bulk_fetch_strategy:  IN-clause-batch | bulk-endpoint | pagination-cursor | none
#     incident_ref:            GitHub issue URL or #number
#     rollback:                URL or description of how to undo this workload's effects
#
# Optional fields for any entry:
#   depends_on:               [workload_id, ...]
#   excluded_windows:         cron expressions or time windows when this workload must NOT run
#   credential_contract:      deployment-level credential details (role, forbiddance, rotation)
#   approved_by:              who authorized
#   approved_at:              YYYY-MM-DD
#   last_reviewed:            YYYY-MM-DD
#   notes:                    free-text notes, dependencies, known limitations

database: retailpulses_shared

workloads:

  # ── Ticketing Seller Share Event API ──────────────────────────────────
  ticket_share_event_api:
    owner_repo: retailpulses/ticket-handling
    domain: ticketing
    mode: write
    access_path: postgrest
    credential_class: write_scoped
    triggers:
      - type: event
    status: pending_approval
    kill_switch:
      method: deploy_rollback
      identifier: ENABLE_TICKET_SHARES
    safety_profile:
      category: agent_operations
      risk_level: medium
      description: >
        Event-driven operator create/rotate/revoke operations and seller page
        resolve/evidence authorization for seven-day ticket share links. The
        ConoHa viewer calls an authenticated ticketing Worker bridge and has no
        direct database credentials.
      affected_tables:
        - tickets
        - ticket_products
        - ticket_attachments
        - platform_accounts
        - ticket_share_tokens
        - ticket_share_attachments
      concurrency_max: 1
      statement_timeout_ms: 5000
      max_retries: 0
      retry_strategy: none
      request_budget:
        max_requests_per_invocation: 6
        max_requests_per_1000_input_rows: 6000
        bulk_fetch_strategy: none
      incident_ref: ""
      rollback: "Deploy rollback to remove ENABLE_TICKET_SHARES flag"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    approved_by: "retailpulses/ticket-handling#151"
    approved_at: "2026-07-16"
    last_reviewed: "2026-07-16"
    notes: >
      Migration replay and functional lifecycle tests passed in isolated local
      PostgreSQL. `none` bulk-fetch strategy is intentional because each request
      is scoped to one ticket/share; product and attachment reads are batched,
      never N+1. Create/rotate retries are idempotent by client operation UUID,
      but the Worker performs no automatic retry. Production remains pending
      until the reviewed ticket-handling commit is recorded in deployed_from,
      schema backup/preflight gates pass, and the ConoHa canary completes.

  # Example entries moved to templates/DATABASE_WORKLOAD.example.yaml

  # ── CatalogSync Product Mirror ─────────────────────────────────────────
  catalogsync_product_mirror:
    owner_repo: retailpulses/CatalogSync
    domain: product_catalog
    mode: write
    access_path: internal_api
    credential_class: write_scoped
    triggers:
      - type: manual
    status: disabled
    kill_switch:
      method: worker_cancel
      identifier: catalogsync.timer
    safety_profile:
      category: syncs
      risk_level: high
      description: >
        Product catalog mirror — reads product data from RPagentOS and writes
        to product_catalog domain tables. Disabled due to resource-exhaustion
        incident #23.
      affected_tables:
        - products
        - product_variants
        - platform_listings
      concurrency_max: 2
      statement_timeout_ms: 30000
      max_retries: 3
      retry_strategy: exponential_backoff_with_jitter
      request_budget:
        max_requests_per_invocation: 100
        max_requests_per_1000_input_rows: 18
        bulk_fetch_strategy: bulk-endpoint
      incident_ref: "retailpulses/CatalogSync#23"
      rollback: "Worker cancel + deploy rollback; see DATABASE_INCIDENT_RESPONSE.md"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    approved_by: "Requires explicit re-approval after incident #23 remediation"
    approved_at: ""
    last_reviewed: ""
    notes: >
      Disabled after resource-exhaustion incident #23. Re-enable requires:
      (1) explicit infra authority approval,
      (2) access path verified and declared,
      (3) batch size bounded to 100-250, request budget to tens/low hundreds,
      (4) change-aware writes with run-level freshness,
      (5) all rollout gates completed in sequence,
      (6) deployed from a reviewed Git commit (no untracked VPS source).

  # ── CatalogSync Marketplace Projection API ────────────────────────────
  catalogsync_marketplace_projection_api_read:
    owner_repo: retailpulses/CatalogSync
    domain: product_catalog
    mode: read_only
    access_path: postgrest
    credential_class: read_only
    triggers:
      - type: manual
    # schedule enabled only after rollout gates
    status: active
    kill_switch:
      method: deploy_rollback
      identifier: CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED
    safety_profile:
      category: scheduled_jobs
      risk_level: medium
      description: >
        Read-only PostgREST workload used by the CatalogSync Cloudflare Worker
        to serve authenticated Amazon and Rakuten marketplace projections to VPS
        consumers. The Worker may read only the RPagentOS-owned
        catalogsync_marketplace_projection_v1 view.
      affected_tables:
        - catalogsync_marketplace_projection_v1
      concurrency_max: 4
      statement_timeout_ms: 10000
      max_retries: 2
      retry_strategy: exponential_backoff_with_jitter

      request_budget:
        max_requests_per_invocation: 50
        max_requests_per_1000_input_rows: 20
        bulk_fetch_strategy: pagination-cursor

      incident_ref: ""
      rollback: "Deploy rollback to disable CATALOGSYNC_MARKETPLACE_PROJECTION_ENABLED"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    credential_contract:
      role: catalogsync_marketplace_reader
      service_role_forbidden: true
      generic_anon_forbidden: true
      operation_mode: read_only
    approved_by: "Retailpulses owner; evidence retailpulses/RPagentOS#32 issuecomment-4999776725"
    approved_at: "2026-07-17"
    last_reviewed: "2026-07-17"
    notes: >
      Two-hop architecture: VPS consumers call the CatalogSync-owned
      authenticated internal API; the CatalogSync Worker separately reads the
      RPagentOS-owned projection through this declared PostgREST workload. No
      automatic fallback, database writes, base-table grants, schema privilege,
      or service-role credential. Production activation requires the owner
      migration, dedicated role JWT, endpoint smoke tests, SKU-scoped dry-runs,
      and deployed_from evidence.

  # ── CatalogSync Mercari shop4 read projection ─────────────────────────
  catalogsync_mercari_shop4_read:
    owner_repo: retailpulses/CatalogSync
    domain: product_catalog
    mode: read_only
    access_path: postgrest
    credential_class: read_only
    triggers:
      - type: cron
        expression: "*/10 * * * *"
        mode: full
      - type: cron
        expression: "* * * * *"
        delay_seconds: 30
        mode: priority
    status: active
    kill_switch:
      method: deploy_rollback
      identifier: CATALOGSYNC_SHOP4_ENABLED
    safety_profile:
      category: scheduled_jobs
      risk_level: medium
      description: >
        Read-only Supabase projection used by the CatalogSync VPS to reconcile
        Mercari shop4 inventory, presale title prefix, and shipping lead time.
        It does not write Supabase and does not cover shops 1-3, Amazon,
        Rakuten, dashboards, or archival.
      affected_tables:
        - platform_accounts
        - platform_listings
        - platform_listing_skus
        - product_variants
        - product_commercials
      concurrency_max: 1
      statement_timeout_ms: 20000
      max_retries: 3
      retry_strategy: exponential_backoff_with_jitter
      request_budget:
        max_requests_per_invocation: 100
        max_rows_per_invocation: 25000
        max_requests_per_1000_input_rows: 5
        bulk_fetch_strategy: pagination-cursor
      incident_ref: "retailpulses/CatalogSync#23"
      rollback: "Deploy rollback to disable CATALOGSYNC_SHOP4_ENABLED"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    credential_contract:
      role: catalogsync_shop4_reader
      service_role_forbidden: true
      database_writes_forbidden: true
      rotation_days_max: 90
      storage: /root/mercari-sync/.env
      file_mode: "0600"
    approved_by: "retailpulses/CatalogSync#29"
    approved_at: "2026-07-17"
    last_reviewed: "2026-07-17"
    notes: >
      Owner approval via RPagentOS PRs 33 and 34 (read-only shop4 projection
      and dedicated Auth identity).

      Active views: catalogsync_mercari_shop4_listing_map_v1 and
      catalogsync_mercari_shop4_catalog_v1. The dedicated
      catalogsync_shop4_reader credential is limited to the approved Shop4
      projections and cannot read Shops 1-3 or base tables. Migration to the
      planned shared projections is a separate, not-yet-activated change.

      The runtime token must never be a Supabase service-role credential.
      Completion report at CatalogSync PR #32.

