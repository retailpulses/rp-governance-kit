# Database Workload Registry — Shared-Database Risk Governance
# ==========================================================
# Registry of recurring workloads that require shared-database ownership,
# access-path, credential, or database-risk governance.
#
# This is NOT a master inventory of all sync behavior. Schedules, release SHAs,
# batch sizes, marketplace mapping, and monitoring thresholds are owned by the
# business repository's local sync inventory (docs/SYNC_JOB_INVENTORY.md).
#
# Version: 6
# Last updated: 2026-07-22
# Governance ref: v1.6.0
#
# Governed by: retailpulses/rp-governance-kit
#
# ── Risk-Based Profiles ─────────────────────────────────────
#
# Every workload entry starts with a standard declaration.
# Only workloads that meet one or more high-risk conditions require
# the extended safety_profile section.
#
# Standard declaration (minimum for all workloads):
#
#   workload_id:               unique identifier (lower_snake_case)
#   owner_repo:                GitHub owner/repo
#   domain:                    domain from DATABASE_OWNERSHIP.yaml
#   mode:                      read_only | write
#   access_path:               postgrest | supavisor | internal_api | direct_postgres
#   credential_class:          read_only | write_scoped | admin | service_role
#   triggers:                  structured trigger objects (see below)
#   status:                    active | disabled | pending_approval
#   kill_switch:
#     method:                  config_flag | process_signal | worker_cancel | dashboard_session_terminate | sql_terminate_backend | deploy_rollback
#     identifier:              config key, cron name, or timer name that disables this workload
#     fail_closed:             true for write workloads unless explicitly approved otherwise
#   local_inventory_ref:       owner-repository path to the local workload inventory
#
# Extended safety_profile (required when any condition applies):
#
#   Conditions requiring extended profile:
#     - mode: write                           (database writes)
#     - High expected row/request volume      (high volume)
#     - trigger is cron/scheduled             (frequent cron)
#     - credential_class is admin or service_role (privileged credential)
#     - Destructive or data-rewriting ops     (destructive transformation)
#     - Large blast radius                    (many consumers or domains affected)
#     - Prior related incident                (incident_ref is set)
#
#   safety_profile:
#     category:                imports | syncs | backfills | scheduled_jobs | agent_operations | maintenance | diagnostics
#     risk_level:              low | medium | high
#     description:             human-readable description
#     affected_tables:         [table_name, ...]
#     concurrency_max:         integer
#     statement_timeout_ms:    integer
#     max_retries:             integer
#     retry_strategy:          exponential_backoff_with_jitter | fixed_delay | none
#     request_budget:
#       max_requests_per_invocation: integer
#       max_requests_per_1000_input_rows: integer
#       bulk_fetch_strategy:  IN-clause-batch | bulk-endpoint | pagination-cursor | none
#     incident_ref:            GitHub issue URL or #number
#     rollback:                URL or description of how to undo this workload's effects
#
# Optional fields for any entry:
#   depends_on:               [workload_id, ...]
#   excluded_windows:         cron expressions or time windows when this workload must NOT run
#   credential_contract:      deployment-level credential details (role, forbiddance, rotation)
#   approved_by:              who authorized
#   approved_at:              YYYY-MM-DD
#   last_reviewed:            YYYY-MM-DD
#   notes:                    free-text notes, dependencies, known limitations

database: retailpulses_shared

workloads:

  # ── Ticketing Seller Share Event API ──────────────────────────────────
  ticket_share_event_api:
    owner_repo: retailpulses/ticket-handling
    domain: ticketing
    mode: write
    access_path: postgrest
    credential_class: write_scoped
    triggers:
      - type: event
    status: pending_approval
    kill_switch:
      method: deploy_rollback
      identifier: ENABLE_TICKET_SHARES
    safety_profile:
      category: agent_operations
      risk_level: medium
      description: >
        Event-driven operator create/rotate/revoke operations and seller page
        resolve/evidence authorization for seven-day ticket share links. The
        ConoHa viewer calls an authenticated ticketing Worker bridge and has no
        direct database credentials.
      affected_tables:
        - tickets
        - ticket_products
        - ticket_attachments
        - platform_accounts
        - ticket_share_tokens
        - ticket_share_attachments
      concurrency_max: 1
      statement_timeout_ms: 5000
      max_retries: 0
      retry_strategy: none
      request_budget:
        max_requests_per_invocation: 6
        max_requests_per_1000_input_rows: 6000
        bulk_fetch_strategy: none
      incident_ref: ""
      rollback: "Deploy rollback to remove ENABLE_TICKET_SHARES flag"
    local_inventory_ref: docs/SYNC_JOB_INVENTORY.md
    approved_by: "retailpulses/ticket-handling#151"
    approved_at: "2026-07-16"
    last_reviewed: "2026-07-16"
    notes: >
      Migration replay and functional lifecycle tests passed in isolated local
      PostgreSQL. `none` bulk-fetch strategy is intentional because each request
      is scoped to one ticket/share; product and attachment reads are batched,
      never N+1. Create/rotate retries are idempotent by client operation UUID,
      but the Worker performs no automatic retry. Production remains pending
      until the reviewed ticket-handling commit is recorded in deployed_from,
      schema backup/preflight gates pass, and the ConoHa canary completes.

